services:
  ai-eraser:
    build: .
    image: ghcr.io/rcushmaniii/ai-eraser:latest
    container_name: ai-eraser
    restart: unless-stopped
    ports:
      - "${DASHBOARD_PORT:-3847}:3847"
    volumes:
      - ai-eraser-data:/app/data
    env_file:
      - .env
    environment:
      - DASHBOARD_HOST=0.0.0.0

volumes:
  ai-eraser-data:
